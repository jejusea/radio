name: Generate placeholder media

# placeholder 미디어(영상/라디오/효과음)를 ffmpeg로 생성해 커밋한다.
# git 바이너리 푸시가 불가능한 환경에서 저장소를 완성하기 위한 수동 실행 워크플로.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
      - name: Generate media
        run: bash tools/generate-placeholders.sh
      - name: Commit media
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media/
          git diff --cached --quiet || git commit -m "placeholder 미디어 생성 (ffmpeg, Actions)"
          git push
